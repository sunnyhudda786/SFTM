{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Updated | Secure File Transfer Monitor</title>
    <link rel="stylesheet" href="{% static 'monitor/styles.css' %}?v=20260617-password-reset">
</head>
<body class="login-body">
    <div class="login-card password-card">
        <div class="brand centered brand-login-stack">
            <div class="brand-login-video-wrap small-logo-wrap">
                <video class="login-logo-video" autoplay muted loop playsinline>
                    <source src="{% static 'monitor/sftm_logo.mp4' %}" type="video/mp4">
                </video>
                <img class="login-logo-fallback" src="{% static 'monitor/sftm_logo.png' %}" alt="SFTM logo">
            </div>
        </div>
        <h1>Password Updated</h1>
        <p class="muted-text">Your password has been reset successfully. You can now sign in with the new password.</p>
        <p class="center-link"><a class="button primary" href="{% url 'login' %}">Go to Login</a></p>

    </div>
</body>
</html>
